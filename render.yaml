# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: suno-voice-dj
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ASSEMBLYAI_API_KEY
        sync: false
